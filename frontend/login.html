<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — LUXE STORE</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-brand">LUXE<span>STORE</span></a>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="logo">LUXE STORE</div>
    <p class="sub">Welcome back! Sign in to your account.</p>

    <div id="error-msg" class="hidden" style="background:rgba(224,82,82,0.1);border:1px solid rgba(224,82,82,0.3);border-radius:8px;padding:0.75rem 1rem;font-size:0.875rem;color:var(--danger);margin-bottom:1rem;"></div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn btn-primary btn-full btn-lg mt-2" id="login-btn">
      Sign In
    </button>

    <div class="auth-divider">or</div>

    <p class="text-center text-sm" style="color:var(--grey-light);">
      Don't have an account?
      <a href="register.html">Create one →</a>
    </p>

    <p class="text-center text-sm mt-2" style="color:var(--grey);">
      <a href="index.html" style="color:var(--grey);">← Continue as guest</a>
    </p>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  // Redirect if already logged in
  if (isLoggedIn()) window.location.href = 'index.html';

  const btn   = document.getElementById('login-btn');
  const errEl = document.getElementById('error-msg');

  function showError(msg) {
    errEl.textContent = msg;
    errEl.classList.remove('hidden');
  }

  // Allow pressing Enter to submit
  ['email','password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });

  btn.addEventListener('click', doLogin);

  async function doLogin() {
    errEl.classList.add('hidden');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) { showError('Please fill in both fields.'); return; }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const data = await authAPI.login(email, password);
      saveAuth(data.token, data.user);
      showToast('Welcome back, ' + data.user.name + '! 👋', 'success');

      // Redirect to where they came from or home
      const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
      setTimeout(() => window.location.href = redirect, 600);
    } catch (err) {
      showError(err.message);
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
