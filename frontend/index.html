<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUXE STORE — Premium Shopping</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── NAVBAR ────────────────────────────────────────────────── -->
<nav class="navbar">
  <a href="index.html" class="nav-brand">LUXE<span>STORE</span></a>

  <div class="nav-search">
    <svg class="nav-search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input type="text" id="search-input" placeholder="Search products…" />
  </div>

  <div class="nav-links">
    <a href="index.html" class="nav-link active">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Shop
    </a>
    <a href="orders.html" class="nav-link">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/>
      </svg>
      Orders
    </a>
    <a href="cart.html" class="nav-link cart-badge-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.99-1.8l1.38-9.2H6"/>
      </svg>
      Cart
      <span class="cart-badge hidden" id="cart-badge">0</span>
    </a>
    <div id="nav-auth" class="flex gap-1 items-center"></div>
  </div>
</nav>

<!-- ── HERO ──────────────────────────────────────────────────── -->
<section class="hero">
  <div class="hero-eyebrow">New Arrivals 2025</div>
  <h1>Shop <em>Smarter</em>,<br>Live Better</h1>
  <p>Curated products. Unbeatable quality. Delivered fast.</p>
  <a href="#products" class="btn btn-primary btn-lg">Explore Collection</a>
</section>

<!-- ── MAIN CONTENT ───────────────────────────────────────────── -->
<main class="container" id="products">

  <!-- Filters bar -->
  <div class="filters-bar">
    <span class="filter-label">Filter:</span>
    <div id="category-filters" class="flex gap-1" style="flex-wrap:wrap;">
      <span class="filter-chip active" data-cat="">All</span>
    </div>

    <div style="margin-left:auto;display:flex;align-items:center;gap:1rem;">
      <select class="filter-select" id="sort-select">
        <option value="">Sort: Newest</option>
        <option value="price_asc">Price: Low → High</option>
        <option value="price_desc">Price: High → Low</option>
        <option value="name">Name A–Z</option>
      </select>
      <span class="results-count" id="results-count"></span>
    </div>
  </div>

  <!-- Products grid -->
  <div id="products-grid" class="products-grid">
    <div class="loading-state">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

</main>

<!-- ── FOOTER ─────────────────────────────────────────────────── -->
<footer class="footer">
  <p>© 2025 <strong>LUXE STORE</strong> — All rights reserved.</p>
</footer>

<script src="js/api.js"></script>
<script>
  // ─────────────────────────────────────────────────────────────
  //  Homepage: product listing with search, filter, pagination
  // ─────────────────────────────────────────────────────────────
  let currentPage     = 1;
  let currentCategory = '';
  let currentSort     = '';
  let searchTimer     = null;

  // ── Load categories into filter chips ───────────────────────
  async function loadCategories() {
    try {
      const cats = await productAPI.categories();
      const container = document.getElementById('category-filters');
      cats.forEach(cat => {
        const chip = document.createElement('span');
        chip.className = 'filter-chip';
        chip.textContent = cat.name;
        chip.dataset.cat = cat.id;
        chip.addEventListener('click', () => {
          currentCategory = cat.id;
          currentPage = 1;
          document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          loadProducts();
        });
        container.appendChild(chip);
      });

      // "All" chip listener
      container.querySelector('[data-cat=""]').addEventListener('click', function () {
        currentCategory = '';
        currentPage = 1;
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        loadProducts();
      });
    } catch {}
  }

  // ── Load & render products ───────────────────────────────────
  async function loadProducts() {
    const grid = document.getElementById('products-grid');
    grid.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';

    const search = document.getElementById('search-input').value.trim();
    try {
      const data = await productAPI.list({
        page: currentPage,
        limit: 12,
        ...(search     && { search }),
        ...(currentCategory && { category: currentCategory }),
        ...(currentSort     && { sort: currentSort }),
      });

      document.getElementById('results-count').textContent =
        `${data.total} product${data.total !== 1 ? 's' : ''}`;

      if (!data.products.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-icon">🔍</div>
            <h2>No products found</h2>
            <p>Try a different search or filter.</p>
          </div>`;
        return;
      }

      grid.innerHTML = data.products.map(p => `
        <article class="product-card" onclick="window.location='product.html?id=${p.id}'">
          <div class="product-card-img">
            <img src="${p.image_url || 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600'}"
                 alt="${p.name}" loading="lazy" />
          </div>
          <div class="product-card-body">
            <span class="product-category">${p.category_name || 'General'}</span>
            <p class="product-name">${p.name}</p>
            <p class="product-price">${formatPrice(p.price)}</p>
            ${stockLabel(p.stock)}
          </div>
          <div class="product-card-footer">
            <button class="btn btn-primary btn-full" onclick="addToCart(event, ${p.id}, '${p.name}', ${p.stock})">
              Add to Cart
            </button>
          </div>
        </article>
      `).join('');

      renderPagination(data.page, data.pages);
    } catch (err) {
      grid.innerHTML = `<p class="text-danger" style="grid-column:1/-1;text-align:center;">Failed to load products.</p>`;
    }
  }

  // ── Add to cart from grid ────────────────────────────────────
  async function addToCart(event, productId, name, stock) {
    event.stopPropagation(); // don't navigate to detail page
    if (!isLoggedIn()) { window.location.href = 'login.html'; return; }
    if (stock === 0) { showToast('This item is out of stock', 'error'); return; }
    try {
      await cartAPI.add(productId, 1);
      showToast(`"${name}" added to cart 🛒`, 'success');
      updateCartBadge();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  // ── Pagination ───────────────────────────────────────────────
  function renderPagination(page, pages) {
    const container = document.getElementById('pagination');
    if (pages <= 1) { container.innerHTML = ''; return; }

    let html = '';
    for (let i = 1; i <= pages; i++) {
      html += `<button class="page-btn${i === page ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }
    container.innerHTML = html;
  }
  function goPage(p) { currentPage = p; loadProducts(); window.scrollTo(0, 0); }

  // ── Search debounce ──────────────────────────────────────────
  document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 1; loadProducts(); }, 400);
  });

  // ── Sort change ──────────────────────────────────────────────
  document.getElementById('sort-select').addEventListener('change', function () {
    currentSort = this.value;
    currentPage = 1;
    loadProducts();
  });

  // ── Init ─────────────────────────────────────────────────────
  loadCategories();
  loadProducts();
</script>
</body>
</html>
